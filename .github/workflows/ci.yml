# ============================================================
# GITHUB ACTIONS — CI/CD Pipeline
# ============================================================
# Questa pipeline si attiva ad ogni push o pull request sul branch "main".
#
# Cosa fa:
# 1. Compila il progetto Java con Maven
# 2. Costruisce l'immagine Docker
# 3. La pusha su GitHub Container Registry (GHCR)
#
# GHCR è il registro Docker GRATUITO di GitHub. Le tue immagini
# saranno accessibili su: ghcr.io/TUO_USERNAME/gestione-formazione
# ============================================================

name: CI/CD Pipeline

# Quando si attiva la pipeline
on:
  push:
    branches: [ main ]          # Ad ogni push sul branch main
  pull_request:
    branches: [ main ]          # Ad ogni PR verso main

jobs:

  # ==================== JOB 1: BUILD & TEST ====================
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest      # Gira su una macchina virtuale Linux di GitHub

    steps:
      # Step 1: Scarica il codice dal repository
      - name: 📥 Checkout del codice
        uses: actions/checkout@v4

      # Step 2: Installa Java 17 (stesso della nostra app)
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'      # Stessa distribuzione del Dockerfile
          cache: maven                  # Cache delle dipendenze Maven (velocizza le build future)

      # Step 3: Compila e testa il progetto
      - name: 🧪 Build con Maven
        run: mvn clean verify -B       # -B = batch mode (niente output interattivo)

      # Step 4: Salva il .jar come "artifact" di GitHub (scaricabile dalla UI)
      - name: 📦 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7            # Conserva per 7 giorni

  # ==================== JOB 2: DOCKER BUILD & PUSH ====================
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build                        # Parte SOLO se il job "build" ha avuto successo
    if: github.event_name == 'push'     # Solo su push (non su PR)

    permissions:
      contents: read
      packages: write                   # Permesso per pushare su GHCR

    steps:
      - name: 📥 Checkout del codice
        uses: actions/checkout@v4

      # Login al GitHub Container Registry
      - name: 🔐 Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Token automatico di GitHub

      # Estrae metadata per i tag dell'immagine Docker
      - name: 🏷️ Estrai metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      # Costruisce e pusha l'immagine Docker
      - name: 🏗️ Build e Push immagine Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
