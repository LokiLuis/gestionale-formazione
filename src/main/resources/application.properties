spring.application.name=JAVAWEBAPP


# 1. Connessione al Database (le credenziali vengono lette dalle variabili d'ambiente)
# 
# La sintassi ${NOME_VARIABILE:valore_di_fallback} significa:
# "Cerca la variabile temporanea 'NOME_VARIABILE' nel sistema. Se non c'è, usa il valore dopo i due punti."
#
# ATTENZIONE: Questi valori di "fallback" (postgres, root) sono inseriti qui SOLO PER COMODITÀ
# di chi scarica il progetto per la prima volta e vuole avviarlo in locale al volo.
# 
# La best practice è rimuovere i fallback (es: solo ${POSTGRES_USER}) 
#
# NOTA DOCKER: Quando l'app gira dentro Docker, il docker-compose.yml sovrascrive
# SPRING_DATASOURCE_URL con "jdbc:postgresql://db:5432/..." perché dentro Docker
# i container si parlano tramite il nome del servizio ("db"), NON tramite "localhost".
# Il fallback "localhost:5443" qui sotto serve SOLO per lo sviluppo locale senza Docker.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5443/${POSTGRES_DB:gestione_formazione}}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:root}

# 2. Hibernate: Aggiorna automaticamente le tabelle se cambi il codice Java
spring.jpa.hibernate.ddl-auto=update

# 3. Opzionale: Mostra le query SQL nella console (utile per debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Dialetto specifico per PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8081