<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" href="/favicon-v3.ico" type="image/x-icon">
    <title>Le Mie Attività</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-arrow-left-circle me-2"></i> Torna alla Dashboard</a>
            <span class="text-white fw-bold">Le Mie Attività</span>
        </div>
    </nav>

    <div class="container">
        <!-- Banner Successo (Es. "Ti sei disiscritto!") -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3"></div>

        <!-- ================= BARRA RICERCA ================= -->
        <div class="card shadow-sm border-0 mb-3">
            <div class="card-body py-2">
                <!-- Ricicla l'URL '/attivita/mie' in formato GET -->
                <form th:action="@{/attivita/mie}" method="get" class="row g-2 align-items-end">
                    <div class="col">
                        <label class="form-label small fw-bold mb-0">Cerca nelle tue attività:</label>
                        <input type="text" name="ricerca" class="form-control form-control-sm"
                            placeholder="Es: Java, React, Python..." th:value="${ricerca}" />
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-sm btn-info text-white"><i
                                class="bi bi-search me-1"></i>Cerca</button>
                    </div>
                    <div class="col-auto">
                        <a href="/attivita/mie" class="btn btn-sm btn-outline-secondary"><i
                                class="bi bi-x-circle me-1"></i>Reset</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- ================= TABELLA "LA MIA AGENDA / ISCRITTI" ================= -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <!-- Visibile solo se la variabile passata non è vuota -->
                <table class="table table-hover align-middle mb-0" th:unless="${listaCorsi.empty}">
                    <thead class="table-light">
                        <tr>
                            <th>Nome Attività</th>
                            <th>Descrizione</th>
                            <th>Inizio</th>
                            <th>Fine</th>
                            <th>Stato</th>
                            <th class="text-center">Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Ciclo dei Corsi dove io sono Studente -->
                        <tr th:each="corso : ${listaCorsi}">
                            <td>
                                <!-- Stampa del puro dato Backend -->
                                <strong th:text="${corso.nome}">Nome Corso</strong>
                            </td>
                            <td th:text="${corso.descrizione}">Descrizione...</td>
                            <td th:text="${corso.dataInizio}">01/01/2024</td>
                            <td th:text="${corso.dataFine}">31/01/2024</td>
                            <td>
                                <!-- Finto stato fisso: potresti calcolarlo in base a new Date() rispetto a dataFine -->
                                <span class="badge bg-success">Attivo</span>
                            </td>
                            <td class="text-center">
                                <!-- 
                                     PULSANTE DISDETTA 
                                     Usa il metodo pubblico di /corsi/disiscriviti per rimuovere SE STESSI dal corso
                                -->
                                <form th:action="@{/corsi/disiscriviti/{id}(id=${corso.id})}" method="post"
                                    onsubmit="return confirm('Vuoi cancellare la tua iscrizione a questo corso?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-x-circle me-1"></i>Annulla iscrizione
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <!-- Messaggio alternativo se tabella vuota -->
                <div th:if="${listaCorsi.empty}" class="text-center py-4 text-muted">
                    Non sei iscritto a nessuna attività al momento.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
