    <!-- Operatore ternario: se l'ID esiste scrivi Modifica altrimenti Nuovo -->
    <title th:text="${utenteForm.id != null ? 'Modifica Utente' : 'Nuovo Utente'}">Utente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card shadow border-0" style="width: 100%; max-width: 550px;">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0" th:text="${utenteForm.id != null ? '✏️ Modifica Utente' : '➕ Nuovo Utente'}">Utente</h5>
        </div>
        <div class="card-body">

            <!-- 
                 Il FORM. 
                 È mappato interamente al DTO "UtenteFormDTO" tramite th:object="${utenteForm}".
                 In questo modo ogni th:field="*{nome}" fa riferimento a utenteForm.getNome() / utenteForm.setNome()
            -->
            <form th:action="@{/utenti/salva}" th:object="${utenteForm}" method="post">

                <!-- ID nascosto — serve per far capire a Spring Data JPA se fare INSERT (se null) o UPDATE (se valorizzato) -->
                <input type="hidden" th:field="*{id}" />

                <!-- 
                     Blocco Username e Password:
                     Viene mostrato SOLO in fase di CREAZIONE (quando id è null).
                     Questo per evitare che un Admin modifichi sbadatamente le credenziali private di qualcuno.
                     Per modificarle andrebbe creata una pagina apposita ("Resetta Password").
                -->
                <div th:if="${utenteForm.id == null}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" class="form-control" th:field="*{username}"
                            th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'" />
                        <!-- Questo div rosso compare solo se Spring Validation (@NotBlank ecc) fallisce per 'username' -->
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" class="form-control" th:field="*{password}"
                            th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                        </div>
                    </div>
                </div>

                <!-- ================= ALTRI CAMPI ANAGRAFICI PERSONALI ================= -->
                <!-- Gestione layout su colonne Bootstrap (col-md-6) per compattezza visiva -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Nome</label>
                        <input type="text" class="form-control" th:field="*{nome}"
                            th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Cognome</label>
                        <input type="text" class="form-control" th:field="*{cognome}"
                            th:classappend="${#fields.hasErrors('cognome')} ? 'is-invalid'" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <!-- Type email fa validazione lato browser su client -->
                    <input type="email" class="form-control" th:field="*{email}"
                        th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Telefono</label>
                        <input type="tel" class="form-control" th:field="*{telefono}"
                            th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid'" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}">
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Codice Fiscale</label>
                        <input type="text" class="form-control" th:field="*{codiceFiscale}"
                            th:classappend="${#fields.hasErrors('codiceFiscale')} ? 'is-invalid'" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('codiceFiscale')}"
                            th:errors="*{codiceFiscale}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Posizione Lavorativa</label>
                    <input type="text" class="form-control" th:field="*{posizioneLavorativa}" />
                </div>

                <!-- 
                     Scelta dinamicà del RUOLO.
                     Il DTO 'UtenteFormDTO' si aspetta solo l'ID numerico (Long roleId).
                -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Ruolo</label>
                    <select class="form-select" th:field="*{roleId}">
                        <!-- Itera la lista fissa arrivata dal Database (ROLE_ADMIN, ROLE_FORMATORE, ecc) -->
                        <option th:each="ruolo : ${listaRuoli}" th:value="${ruolo.id}" th:text="${ruolo.nome}">
                        </option>
                    </select>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <a href="/utenti" class="btn btn-outline-secondary">Annulla</a>
                    <!-- Modifica dicitura bottone in base se è un Salvataggio di Update o un Insert -->
                    <button type="submit" class="btn btn-primary px-4"
                        th:text="${utenteForm.id != null ? '💾 Salva Modifiche' : '➕ Crea Utente'}">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
