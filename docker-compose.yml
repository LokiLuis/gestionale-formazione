# ============================================================
# DOCKER COMPOSE — Orchestrazione di tutti i container
# ============================================================
# Questo file definisce TUTTI i servizi (container) che
# compongono la nostra applicazione. Con un singolo comando
# "docker-compose up" partono sia il Database che l'App Java.
# ============================================================

version: '3.8'

services:

  # ==================== DATABASE ====================
  # Container PostgreSQL: crea e gestisce il database
  db:
    image: postgres:15
    container_name: postgres_formazione
    environment:
      # Queste variabili vengono lette automaticamente dal file .env
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Mappa la porta 5443 del TUO PC alla porta 5432 del container
      # Questo serve per collegarti al DB dal tuo IDE (es: DBeaver)
      - "5443:5432"
    volumes:
      # Volume persistente: i dati del DB sopravvivono al riavvio del container
      - postgres_data:/var/lib/postgresql/data

  # ==================== APPLICAZIONE SPRING BOOT ====================
  # Container Java: compila e avvia la nostra webapp
  backend:
    build: . # Dice a Docker: "Leggi il Dockerfile nella cartella corrente"
    container_name: springboot_formazione
    ports:
      # Mappa la porta 8081 del TUO PC alla porta 8081 del container
      - "8081:8081"
    depends_on:
      # IMPORTANTE: il backend parte SOLO DOPO che il container "db" è avviato.
      # Attenzione: questo garantisce solo l'ordine di avvio, NON che il DB
      # sia già pronto ad accettare connessioni (per quello servirebbe un healthcheck).
      - db
    environment:
      # Qui sovrascriviamo le proprietà di Spring Boot per la connessione al DB.
      # NOTA FONDAMENTALE: usiamo "db" come hostname (NON "localhost"!),
      # perché dentro Docker i container si parlano tramite il nome del servizio.
      # La porta è 5432 (quella interna di Postgres), NON 5443 (quella mappata sul PC).
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  postgres_data:
