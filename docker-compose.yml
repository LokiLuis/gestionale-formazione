# ============================================================
# DOCKER COMPOSE — Orchestrazione di tutti i container
# ============================================================
# Questo file definisce TUTTI i servizi (container) che
# compongono la nostra applicazione. Con un singolo comando
# "docker-compose up" partono Database, App Java, Prometheus e Grafana.
# ============================================================

services:

  # ==================== DATABASE ====================
  db:
    image: postgres:15
    container_name: postgres_formazione
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5443:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== APPLICAZIONE SPRING BOOT ====================
  backend:
    build: .
    container_name: springboot_formazione
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy  # Aspetta che il DB sia DAVVERO pronto (non solo avviato)
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Spring Boot impiega un po' a partire

  # ==================== PROMETHEUS (Raccolta metriche) ====================
  # Prometheus raccoglie ("scrapa") le metriche dall'app ogni 15 secondi.
  # Accedi alla UI: http://localhost:9090
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml  # Configurazione scraping
      - prometheus_data:/prometheus                                 # Dati persistenti
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ==================== GRAFANA (Dashboard di visualizzazione) ====================
  # Grafana legge i dati da Prometheus e li visualizza in dashboard interattive.
  # Accedi alla UI: http://localhost:3000 (user: admin / password: admin)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana                                          # Dati persistenti
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources  # Auto-config datasource
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards    # Auto-config dashboard
      - ./grafana/dashboards:/var/lib/grafana/dashboards                          # File JSON dashboard
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
