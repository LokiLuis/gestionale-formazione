# ============================================================
# GRAFANA — Auto-provisioning delle Dashboard
# ============================================================
# Questo file dice a Grafana: "Carica automaticamente le dashboard
# dalla cartella /var/lib/grafana/dashboards al primo avvio."
# ============================================================

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
